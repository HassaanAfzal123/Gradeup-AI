# GradeUp AI — fresh Docker stack (backend + frontend only).
# ChromaDB runs embedded in the backend (PersistentClient); no separate Chroma service.
# Prereq: copy backend/.env.example → backend/.env and set GROQ_API_KEY, SECRET_KEY, etc.

name: gradeup-ai

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gradeup-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Persistent paths inside the container (override host-relative .env values)
      CHROMA_PERSIST_DIR: /app/chroma_data
      DATABASE_URL: sqlite:////app/data/gradeup.db
    volumes:
      - gradeup_chroma:/app/chroma_data
      - gradeup_uploads:/app/uploads
      - gradeup_sqlite:/app/data
      # Speeds up restarts: embedding model survives container recreate
      - gradeup_huggingface:/root/.cache/huggingface
    healthcheck:
      # First boot downloads all-MiniLM-L6-v2; port 8000 stays closed until import finishes.
      # 240s is too short — Compose marks unhealthy before uvicorn binds.
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 1800s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: gradeup-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gradeup_chroma:
  gradeup_uploads:
  gradeup_sqlite:
  gradeup_huggingface:
